name: Deploy to cPanel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate required secrets
        run: |
          set -e
          [ -n "${{ secrets.CPANEL_FTP_SERVER }}" ] || (echo "Missing secret: CPANEL_FTP_SERVER" && exit 1)
          [ -n "${{ secrets.CPANEL_FTP_USERNAME }}" ] || (echo "Missing secret: CPANEL_FTP_USERNAME" && exit 1)
          [ -n "${{ secrets.CPANEL_FTP_PASSWORD }}" ] || (echo "Missing secret: CPANEL_FTP_PASSWORD" && exit 1)
          [ -n "${{ secrets.CPANEL_FTP_PORT }}" ] || (echo "Missing secret: CPANEL_FTP_PORT" && exit 1)
          [ -n "${{ secrets.CPANEL_FTP_REMOTE_DIR }}" ] || (echo "Missing secret: CPANEL_FTP_REMOTE_DIR" && exit 1)
          echo "Secret preflight passed"

      - name: Setup Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install NPM dependencies and build assets
        run: |
          npm ci
          npm run build
          rm -f public/hot

      - name: Prepare incremental deploy package
        run: |
          set -e
          rm -rf .deploy-changed
          mkdir -p .deploy-changed

          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            CHANGED_FILES=$(git ls-files)
          else
            CHANGED_FILES=$(git diff --name-only --diff-filter=ACMRT "$BEFORE" "$AFTER")
          fi

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            [ -f "$file" ] || continue
            mkdir -p ".deploy-changed/$(dirname "$file")"
            cp "$file" ".deploy-changed/$file"
          done <<< "$CHANGED_FILES"

          # Always include freshly built front-end assets.
          if [ -d public/build ]; then
            mkdir -p .deploy-changed/public
            cp -R public/build .deploy-changed/public/
          fi

          echo "Prepared incremental package contents:"
          find .deploy-changed -type f | wc -l

      - name: Deploy files via FTP/FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.CPANEL_FTP_SERVER }}
          username: ${{ secrets.CPANEL_FTP_USERNAME }}
          password: ${{ secrets.CPANEL_FTP_PASSWORD }}
          protocol: ftps
          port: ${{ secrets.CPANEL_FTP_PORT }}
          server-dir: ${{ secrets.CPANEL_FTP_REMOTE_DIR }}
          local-dir: .deploy-changed/
          dangerous-clean-slate: false
          exclude: |
            **/.git*/**
            **/.github/**
            **/node_modules/**
            **/vendor/**
            **/tests/**
            **/.env
            **/.env.*
            **/storage/logs/**
            **/storage/framework/cache/data/**
            **/storage/framework/sessions/**
            **/storage/framework/views/**
            **/phpunit.xml
            **/*.md

      - name: Manual post-deploy reminder
        run: |
          echo "FTP deploy completed. Run these on cPanel Terminal (inside app path):"
          echo "composer install --no-dev --optimize-autoloader --no-interaction"
          echo "php artisan migrate --force"
          echo "php artisan optimize:clear"
          echo "php artisan storage:link --force"
          echo "php artisan optimize"
