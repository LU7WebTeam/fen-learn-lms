name: Deploy to cPanel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Validate required secrets
        run: |
          set -e
          [ -n "${{ secrets.CPANEL_HOST }}" ] || (echo "Missing secret: CPANEL_HOST" && exit 1)
          [ -n "${{ secrets.CPANEL_PORT }}" ] || (echo "Missing secret: CPANEL_PORT" && exit 1)
          [ -n "${{ secrets.CPANEL_USER }}" ] || (echo "Missing secret: CPANEL_USER" && exit 1)
          [ -n "${{ secrets.CPANEL_SSH_KEY }}" ] || (echo "Missing secret: CPANEL_SSH_KEY" && exit 1)
          [ -n "${{ secrets.CPANEL_APP_PATH }}" ] || (echo "Missing secret: CPANEL_APP_PATH" && exit 1)
          echo "Secret preflight passed"

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, bcmath, pdo_mysql, pdo_sqlite, zip, gd, curl, xml
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Setup Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install NPM dependencies and build assets
        run: |
          npm ci
          npm run build
          rm -f public/hot

      - name: Configure SSH
        run: |
          set -e
          mkdir -p ~/.ssh
          KEY='${{ secrets.CPANEL_SSH_KEY }}'
          if printf "%s" "$KEY" | grep -q "\\\\n"; then
            # Support keys pasted as a single line with escaped newlines.
            printf "%b" "$KEY" | tr -d '\r' > ~/.ssh/deploy_key
          else
            printf "%s" "$KEY" | tr -d '\r' > ~/.ssh/deploy_key
          fi
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.CPANEL_PORT }}" -H "${{ secrets.CPANEL_HOST }}" >> ~/.ssh/known_hosts || true
          cat >> ~/.ssh/config << EOF
          Host deploy_target
            HostName ${{ secrets.CPANEL_HOST }}
            Port ${{ secrets.CPANEL_PORT }}
            User ${{ secrets.CPANEL_USER }}
            IdentityFile ~/.ssh/deploy_key
            UserKnownHostsFile ~/.ssh/known_hosts
            StrictHostKeyChecking yes
          EOF

      - name: Test network reachability
        run: |
          timeout 10 bash -c "cat < /dev/null > /dev/tcp/${{ secrets.CPANEL_HOST }}/${{ secrets.CPANEL_PORT }}" \
            && echo "TCP connection to SSH port is reachable" \
            || (echo "Cannot reach SSH host/port from GitHub runner" && exit 1)

      - name: Test SSH connection
        run: |
          ssh -vv -o BatchMode=yes -o ConnectTimeout=20 deploy_target "echo Connected to \\$(hostname) as \\$(whoami)"

      - name: Sync files to server
        run: |
          rsync -az --delete \
            -e "ssh -o BatchMode=yes -o ConnectTimeout=20" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='storage/logs/*.log' \
            --exclude='storage/framework/cache/data' \
            --exclude='storage/framework/sessions/*' \
            --exclude='storage/framework/views/*' \
            --exclude='tests/' \
            --exclude='phpunit.xml' \
            --exclude='*.md' \
            ./ "deploy_target:${{ secrets.CPANEL_APP_PATH }}/"

      - name: Run post-deploy commands
        run: |
          ssh deploy_target "
            set -e
            cd '${{ secrets.CPANEL_APP_PATH }}'
            mkdir -p storage/framework/{cache,sessions,views} storage/logs bootstrap/cache
            chmod -R ug+rwx storage bootstrap/cache || true
            php artisan migrate --force
            php artisan optimize:clear
            php artisan storage:link --force
            php artisan optimize
            echo 'Deployment complete!'
          "
